<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://cdn.jsdelivr.net/npm/emojione@4/assets/svg/1f5e2.svg" type="image/svg+xml">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <title>CodeAudit: Your Personal Code Security Assistant</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #1c2128;
            --accent-color: #58a6ff;
            --font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: var(--font-family);
            background-color: var(--bg-primary);
            color: white;
            box-sizing: border-box;
        }

        header, footer {
            text-align: center;
            padding: 1rem;
            background-color: var(--bg-secondary);
        }

        main {
            padding: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        input, button {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: none;
            border-radius: 4px;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        button {
            cursor: pointer;
        }

        .loading {
            text-align: center;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>CodeAudit</h1>
        <p>Your Personal Code Security Assistant</p>
    </header>
    <main>
        <section id="code-input">
            <h2>Analyze Your Code</h2>
            <textarea id="code" placeholder="Enter your code here..."></textarea>
            <button id="analyze-btn">Analyze</button>
        </section>
        <section id="results" class="card">
            <h2>Results</h2>
            <pre id="result-json"></pre>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 CodeAudit. All rights reserved.</p>
    </footer>
    <script src="/js/app.js"></script>
</body>
</html>
